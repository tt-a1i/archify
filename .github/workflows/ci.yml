name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: archify/package-lock.json
      - name: Install renderer dependencies
        run: npm ci
        working-directory: archify
      - name: Golden-file + schema tests
        run: npm test
        working-directory: archify

  webm-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Provision a known Chrome runtime
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true
      - name: Install the WebM decoder
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y ffmpeg
      - name: Decode a real motion export and reject static frames
        run: npm run test:webm
        working-directory: archify
        env:
          ARCHIFY_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}

  zip-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild archify.zip and compare contents
        run: |
          (cd /tmp && "$GITHUB_WORKSPACE/scripts/build-zip.sh" fresh.zip)
          mkdir /tmp/fresh /tmp/checked
          unzip -q /tmp/fresh.zip -d /tmp/fresh
          unzip -q archify.zip -d /tmp/checked
          if ! diff -r /tmp/fresh/archify /tmp/checked/archify; then
            echo '::error::archify.zip is stale — run scripts/build-zip.sh and commit the result'
            exit 1
          fi

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate packaged skill without installing dependencies
        run: |
          set -euo pipefail
          rm -rf /tmp/archify-package
          mkdir -p /tmp/archify-package
          unzip -q archify.zip -d /tmp/archify-package
          cd /tmp/archify-package/archify
          test ! -d node_modules
          test ! -f package-lock.json
          test ! -f scripts/generate-validators.mjs
          node -e "const p=require('./package.json'); if (p.dependencies || p.devDependencies) process.exit(1)"

          node bin/archify.mjs --help
          node bin/archify.mjs doctor
          node bin/archify.mjs demo /tmp/archify-demo
          node bin/archify.mjs examples
          node bin/archify.mjs render workflow examples/agent-tool-call.workflow.json /tmp/workflow.html
          node bin/archify.mjs check /tmp/workflow.html
          node bin/archify.mjs deliver workflow examples/agent-tool-call.workflow.json /tmp/workflow-delivered.html --quality showcase --json

          node bin/archify.mjs validate architecture examples/web-app.architecture.json --json
          node bin/archify.mjs validate workflow examples/agent-tool-call.workflow.json --json
          node bin/archify.mjs validate sequence examples/cache-miss-request.sequence.json --json
          node bin/archify.mjs validate dataflow examples/product-analytics.dataflow.json --json
          node bin/archify.mjs validate lifecycle examples/agent-run.lifecycle.json --json

          node -e "const fs=require('fs'); const p='examples/agent-tool-call.workflow.json'; const d=JSON.parse(fs.readFileSync(p)); d.nodes[0].colour='cyan'; fs.writeFileSync('/tmp/invalid-workflow.json', JSON.stringify(d))"
          if node bin/archify.mjs validate workflow /tmp/invalid-workflow.json --json; then
            echo '::error::packaged skill accepted schema-invalid input without node_modules'
            exit 1
          fi
