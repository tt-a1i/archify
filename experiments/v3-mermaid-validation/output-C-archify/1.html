<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Decision Loop — Archify</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020617; --grid:#1e293b; --text:#fff; --text-muted:#94a3b8; --text-dim:#475569;
  --panel:rgba(15,23,42,0.5); --panel-border:#1e293b;
  --arrow:#64748b; --arrow-emphasis:#34d399; --mask:#0f172a;
  --frontend-fill:rgba(8,51,68,0.4); --frontend-stroke:#22d3ee;
  --backend-fill:rgba(6,78,59,0.4); --backend-stroke:#34d399;
  --database-fill:rgba(76,29,149,0.4); --database-stroke:#a78bfa;
  --cloud-fill:rgba(120,53,15,0.3); --cloud-stroke:#fbbf24;
  --security-fill:rgba(136,19,55,0.4); --security-stroke:#fb7185;
  --messagebus-fill:rgba(251,146,60,0.3); --messagebus-stroke:#fb923c;
  --external-fill:rgba(30,41,59,0.5); --external-stroke:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;background:var(--bg);min-height:100vh;padding:2rem;color:var(--text)}
.container{max-width:1400px;margin:0 auto}
.header{margin-bottom:2rem}
.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.pulse-dot{width:12px;height:12px;background:var(--frontend-stroke);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.025em}
.subtitle{color:var(--text-muted);font-size:.875rem;margin-left:1.75rem}
.diagram-container{background:var(--panel);border-radius:1rem;border:1px solid var(--panel-border);padding:1.5rem;overflow-x:auto}
svg{width:100%;display:block}
.c-grid{stroke:var(--grid);fill:none}
.c-mask{fill:var(--mask);stroke:none}
.c-frontend{fill:var(--frontend-fill);stroke:var(--frontend-stroke)}
.c-backend{fill:var(--backend-fill);stroke:var(--backend-stroke)}
.c-database{fill:var(--database-fill);stroke:var(--database-stroke)}
.c-cloud{fill:var(--cloud-fill);stroke:var(--cloud-stroke)}
.c-security{fill:var(--security-fill);stroke:var(--security-stroke)}
.c-messagebus{fill:var(--messagebus-fill);stroke:var(--messagebus-stroke)}
.c-external{fill:var(--external-fill);stroke:var(--external-stroke)}
.t-primary{fill:var(--text)}.t-muted{fill:var(--text-muted)}.t-dim{fill:var(--text-dim)}
.t-frontend{fill:var(--frontend-stroke)}.t-backend{fill:var(--backend-stroke)}
.t-database{fill:var(--database-stroke)}.t-cloud{fill:var(--cloud-stroke)}
.t-security{fill:var(--security-stroke)}.t-messagebus{fill:var(--messagebus-stroke)}
.t-external{fill:var(--external-stroke)}
.a-default{stroke:var(--arrow);fill:none}.a-emphasis{stroke:var(--arrow-emphasis);fill:none}
.a-security{stroke:var(--security-stroke);fill:none;stroke-dasharray:5,5}
.a-dashed{stroke:var(--database-stroke);fill:none;stroke-dasharray:4,4}
.m-default{fill:var(--arrow)}.m-emphasis{fill:var(--arrow-emphasis)}
.m-security{fill:var(--security-stroke)}.m-dashed{fill:var(--database-stroke)}
.c-security-group{fill:transparent;stroke:var(--security-stroke);stroke-dasharray:4,4}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-row"><div class="pulse-dot"></div><h1>Decision Loop</h1></div>
    <p class="subtitle">Conditional flow with retry path</p>
  </div>
  <div class="diagram-container">
    <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" class="m-default"/></marker>
        <marker id="arrowhead-emphasis" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" class="m-emphasis"/></marker>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" class="c-grid" stroke-width="0.5"/></pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>

      <!-- Start -->
      <rect x="380" y="50" width="140" height="56" rx="6" class="c-mask"/>
      <rect x="380" y="50" width="140" height="56" rx="6" class="c-external" stroke-width="1.5"/>
      <text x="450" y="76" class="t-primary" font-size="13" font-weight="600" text-anchor="middle">Start</text>
      <text x="450" y="93" class="t-muted" font-size="9" text-anchor="middle">entry point</text>

      <!-- Is it? — diamond decision -->
      <polygon points="450,170 590,240 450,310 310,240" class="c-mask"/>
      <polygon points="450,170 590,240 450,310 310,240" class="c-backend" stroke-width="1.5"/>
      <text x="450" y="237" class="t-primary" font-size="13" font-weight="600" text-anchor="middle">Is it?</text>
      <text x="450" y="254" class="t-muted" font-size="9" text-anchor="middle">decision</text>

      <!-- OK -->
      <rect x="80" y="350" width="140" height="56" rx="6" class="c-mask"/>
      <rect x="80" y="350" width="140" height="56" rx="6" class="c-backend" stroke-width="1.5"/>
      <text x="150" y="376" class="t-primary" font-size="13" font-weight="600" text-anchor="middle">OK</text>
      <text x="150" y="393" class="t-muted" font-size="9" text-anchor="middle">accept branch</text>

      <!-- Rethink -->
      <rect x="80" y="470" width="140" height="56" rx="6" class="c-mask"/>
      <rect x="80" y="470" width="140" height="56" rx="6" class="c-backend" stroke-width="1.5"/>
      <text x="150" y="496" class="t-primary" font-size="13" font-weight="600" text-anchor="middle">Rethink</text>
      <text x="150" y="513" class="t-muted" font-size="9" text-anchor="middle">retry</text>

      <!-- End -->
      <rect x="680" y="350" width="140" height="56" rx="6" class="c-mask"/>
      <rect x="680" y="350" width="140" height="56" rx="6" class="c-external" stroke-width="1.5"/>
      <text x="750" y="376" class="t-primary" font-size="13" font-weight="600" text-anchor="middle">End</text>
      <text x="750" y="393" class="t-muted" font-size="9" text-anchor="middle">terminal</text>

      <!-- Start -> Is it? -->
      <line x1="450" y1="106" x2="450" y2="166" class="a-default" stroke-width="1.5" marker-end="url(#arrowhead)"/>

      <!-- Is it? -> OK (Yes) -->
      <path d="M 310 240 Q 250 240 220 290 L 180 348" class="a-emphasis" stroke-width="1.5" marker-end="url(#arrowhead-emphasis)"/>
      <text x="225" y="285" class="t-backend" font-size="10" font-weight="600">Yes</text>

      <!-- OK -> Rethink -->
      <line x1="150" y1="406" x2="150" y2="467" class="a-default" stroke-width="1.5" marker-end="url(#arrowhead)"/>

      <!-- Rethink -> Is it? (loop back) -->
      <path d="M 220 498 Q 280 498 280 410 Q 280 330 360 280" class="a-default" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,3"/>
      <text x="305" y="450" class="t-muted" font-size="9">loop</text>

      <!-- Is it? -> End (No) -->
      <path d="M 590 240 Q 650 240 680 290 L 720 348" class="a-default" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <text x="675" y="285" class="t-muted" font-size="10" font-weight="600">No</text>
    </svg>
  </div>
</div>
</body>
</html>
